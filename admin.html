<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body { font-family: Arial; background:#0b0f1a; color:white; padding:20px; }
input, button { display:block; margin:8px 0; padding:8px; width:250px; }
button { cursor:pointer; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Passwort">
    <button id="loginBtn">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none;">

    <h2>Admin Panel</h2>

    <button id="logoutBtn">Logout</button>

    <hr>

    <h3>Produkt hinzufügen</h3>

    <input id="name" placeholder="Name">
    <input id="desc" placeholder="Beschreibung">
    <input id="image" placeholder="Bild URL">
    <input id="link" placeholder="Link">

    <select id="board">
        <option>Gaming</option>
        <option>Audio</option>
        <option>Setup</option>
    </select>

    <input id="category" placeholder="Kategorie">

    <button id="addBtn">Hinzufügen</button>

    <hr>

    <h3>Produkte</h3>
    <div id="productList"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
