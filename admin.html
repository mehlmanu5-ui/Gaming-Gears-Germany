<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Board Admin</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login" id="loginBox">

    <h1>🔒 Admin Login</h1>

    <input
        type="email"
        id="email"
        placeholder="E-Mail">

    <input
        type="password"
        id="password"
        placeholder="Passwort">

    <button id="loginBtn">
        Login
    </button>

</div>


<div id="adminPanel" style="display:none;">

    <h1>Tech Board Admin</h1>

    <p>Login erfolgreich ✅</p>

</div>

<script type="module" src="admin.js"></script>
<div id="adminPanel" style="display:none;">

    <h1>📦 Admin Dashboard</h1>

    <button id="logoutBtn">Logout</button>

    <hr>

    <h2>➕ Neues Produkt</h2>

    <input id="name" placeholder="Produktname">
    <input id="desc" placeholder="Beschreibung">
    <input id="image" placeholder="Bild URL">
    <input id="link" placeholder="Produkt Link">

    <select id="board">
        <option value="Gaming">Gaming</option>
        <option value="Audio">Audio</option>
        <option value="Setup">Setup</option>
    </select>

    <input id="category" placeholder="Kategorie (z.B. Mäuse)">

    <button id="addBtn">Produkt hinzufügen</button>

</div>
</body>
</html>
