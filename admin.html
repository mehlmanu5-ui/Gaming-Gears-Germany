<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADMIN NODE</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>
    ADMIN CONTROL
</header>




<!-- LOGIN -->

<div id="loginBox" class="filters">


    <input 
    id="email" 
    placeholder="Email">


    <input 
    id="password" 
    type="password" 
    placeholder="Password">


    <button onclick="login()">
        LOGIN
    </button>


</div>







<!-- ADMIN PANEL -->

<div id="adminBox" style="display:none;">



<!-- PRODUCT CREATE / EDIT -->

<div class="filters">


<input 
id="name"
placeholder="Produkt Name">



<input 
id="desc"
placeholder="Beschreibung">



<input 
id="image"
placeholder="Bild URL">



<input 
id="link"
placeholder="Affiliate Link">





<select id="board">

<option value="">
Board wählen
</option>


</select>






<select id="category">

<option value="">
Kategorie wählen
</option>


</select>






<div class="featured-check">


<input 
type="checkbox"
id="featured">


<label for="featured">

⭐ Featured Product

</label>


</div>






<button onclick="addProduct()">

ADD PRODUCT

</button>



<button onclick="updateProduct()">

UPDATE PRODUCT

</button>




<button onclick="logout()">

LOGOUT

</button>



</div>








<!-- BOARD CREATE -->


<div class="filters">


<input 
id="newBoard"
placeholder="Neues Board">


<button onclick="addBoard()">

+ Board erstellen

</button>


</div>









<!-- CATEGORY CREATE -->


<div class="filters">


<input 
id="newCategory"
placeholder="Neue Kategorie">


<button onclick="addCategory()">

+ Kategorie erstellen

</button>


</div>









<!-- PRODUCTS -->

<div id="grid"></div>






</div>







<script type="module" src="admin.js"></script>


</body>

</html>
