<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ADMIN NODE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>ADMIN CONTROL</header>

<!-- LOGIN -->
<div id="loginBox" class="filters">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">LOGIN</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminBox" style="display:none;">

    <div class="filters">

        <input id="name" placeholder="Name">
        <input id="desc" placeholder="Desc">
        <input id="image" placeholder="Image URL">
        <input id="link" placeholder="Link">

        <select id="board">
            <option>Gaming</option>
            <option>Audio</option>
            <option>Setup</option>
        </select>

        <select id="category">
            <option value="">Kategorie wählen</option>
        </select>

        <button onclick="addProduct()">ADD</button>
        <button onclick="logout()">LOGOUT</button>

    </div>

    <!-- CATEGORY CREATE -->
    <div class="filters">
        <input id="newCategory" placeholder="Neue Kategorie...">
        <button onclick="addCategory()">+ Kategorie erstellen</button>
    </div>

    <div id="grid"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
